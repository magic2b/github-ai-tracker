name: Daily AI Tracker

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 1:00 = 北京时间 9:00
  workflow_dispatch:        # 支持手动触发

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch trending AI repos
        run: python scripts/fetch_trending.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send to Telegram
        run: python scripts/notify_telegram.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Send to Feishu
        run: python scripts/notify_feishu.py
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

      - name: Generate Obsidian report
        run: python scripts/write_obsidian.py

      - name: Commit Obsidian files
        run: |
          git config user.name "AI Tracker Bot"
          git config user.email "bot@example.com"
          git add obsidian/ data/
          git diff --cached --quiet || git commit -m "daily: AI report $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
